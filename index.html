<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>オトアソブ生成AI 動画ライブラリ</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #fff;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e2ef;
      --accent: #0b72e7;
      --accent-soft: #e8f2ff;
      --hit: #ecfdf3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #fff 0%, #edf6ff 58%, #f7fbff 100%);
    }
    .wrap { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .hero { padding: 30px 0 20px; display: grid; gap: 10px; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 42px); line-height: 1.16; }
    .lead { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.7; }
    .toolbar {
      margin: 18px 0 14px;
      display: grid;
      grid-template-columns: 1.5fr repeat(3, minmax(130px, 1fr));
      gap: 10px;
    }
    input, select, button {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
    }
    input, select { width: 100%; padding: 0 12px; }
    .switches { display: flex; flex-wrap: wrap; gap: 12px; color: var(--muted); font-size: 13px; }
    .switches label { display: inline-flex; align-items: center; gap: 6px; }
    .switches input { min-height: auto; width: auto; }
    button {
      padding: 0 14px;
      cursor: pointer;
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 700;
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 12px;
      color: var(--muted);
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      padding-bottom: 40px;
    }
    .card {
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .thumb {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #dfe7f2;
    }
    .body { padding: 13px; display: grid; gap: 10px; }
    .title {
      color: var(--ink);
      text-decoration: none;
      font-weight: 760;
      font-size: 15px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .title:hover { color: var(--accent); }
    .meta { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      display: inline-flex;
      max-width: 100%;
      min-height: 24px;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef6f3;
      color: #315347;
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .tag.transcript { background: var(--accent-soft); color: #155bb5; }
    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hit {
      display: block;
      padding: 9px;
      border: 1px solid #bde8cc;
      border-radius: 8px;
      background: var(--hit);
      color: #17663a;
      font-size: 12px;
      line-height: 1.55;
      text-decoration: none;
    }
    .hit strong { font-weight: 780; }
    .empty {
      grid-column: 1 / -1;
      padding: 34px;
      text-align: center;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    @media (max-width: 860px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .wrap { width: min(100% - 20px, 1120px); }
      .toolbar { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .status { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

ussion, Other）が表示されます。\n3:30 - 分割された全てのステムが再生されます。\n3:37 - 「Guitar」ステムをソロ再生しますが、オリジナル音源にギターは含まれていないことを指摘します。\n3:52 - 「Bass」ステムをソロ再生します。\n4:18 - 「Drums」ステムをソロ再生します。\n4:29 - 「Percussion」ステムをソロ再生し、その精度に驚きを示します。\n4:32 - 各ステムの波形が表示されないため、どのパートがどこにあるか分かりにくいというUI上の課題を指摘します。\n5:18 - 各ステムを個別にダウンロードしたり、「Download All」でまとめてダウンロードしたりできることを示します。\n5:27 - 編集画面に移動しますが、抽出されたステムが個別のトラックとして表示されないことに言及します。\n5:38 - ステムを個別のトラックとして編集できる機能があれば便利だと感想を述べます。\n6:20 - 現在の編集機能が、抽出されたステムを直接操作するものではないことを補足します。\n6:35 - 今回の動画は「Get Stems」機能に特化していることを再確認します。\n6:42 - 次に、オリジナル音源からカバーソングを作成し、そのカバーソングに対して「Get Stems」を試みます。\n6:50 - カバーソングの作成手順：「Remix/Edit」メニューから「Cover」を選択します。\n6:58 - 歌詞が自動生成されたことに驚きを示します。\n7:22 - カバーソング作成時の詳細設定で、「Weirdness」を0%に、「Style Influence」と「Audio Influence」を100%に設定します。\n7:37 - オリジナル音源の忠実度を高めるために、これらのパラメータを調整します。\n7:58 - 作成されたカバーソングを特定のワークスペースに保存する設定をします。\n8:01 - カバーソングのリミックスを開始します。以前より生成が速くなったことに触れます。\n8:14 - 生成されたカバーソング「侍(v4.5)」を再生します。\n8:58 - 生成されたカバーソングの忠実度に驚きと称賛の意を表します。\n9:39 - 生成されたカバーソングに対して、再び「Get Stems」機能を使用します。\n9:48 - 新たなステム抽出のために50クレジットが消費されることを確認します。\n10:03 - カバーソングから抽出されたステム（Lead Vocals, Backing Vocals, Drums, Bass, Guitar, Keyboard, Percussion, Synth, Other）が表示されます。オリジナル音源にはなかった「Keyboard」と「Synth」も抽出されたことに注目します。\n10:10 - カバーソングの「Bass」ステムをソロ再生します。\n10:15 - カバーソングの「Lead Vocals」ステムをソロ再生します。\n10:25 - カバーソングの「Backing Vocals」ステムをソロ再生します。\n10:33 - カバーソングの「Keyboard」ステムをソロ再生し、オリジナル音源にはなかったパートが抽出されたことに驚きます。\n10:49 - カバーソングの「Guitar」ステムをソロ再生します。\n11:08 - カバーソングの「Synth」ステムをソロ再生します。\n11:27 - AIが音源を解析し、わずかな音でもパートとして分離している可能性について考察します。\n11:38 - 各ステムの波形表示や、DAWのように編集できる機能がSuno AI内にあれば、さらに使いやすくなるだろうと提案します。\n12:00 - 動画のまとめに入り、Suno AIの「Get Stems」機能の精度に感銘を受けたことを述べます。\n12:03 - Suno AIの最新アップデートにより、各パートの抽出精度が向上し、音楽活動をしているユーザーにとって非常に有用であると結論付けます。","transcript":""},{"id":"n6lASHZUwqU","title":"子供が描いた絵が動き出す83 #にじボイス","url":"https://www.youtube.com/shorts/n6lASHZUwqU","thumbnail":"https://i.ytimg.com/vi/n6lASHZUwqU/hqdefault.jpg","category":"動画生成AI","tool":"にじボイス","type":"short","published_at":"2025-0   <script>
    const videos = JSON.parse(document.getElementById("video-data").textContent);
    const els = {
      q: document.getElementById("q"),
      category: document.getElementById("category"),
      tool: document.getElementById("tool"),
      type: document.getElementById("type"),
      includeTranscript: document.getElementById("includeTranscript"),
      count: document.getElementById("count"),
      results: document.getElementById("results"),
      reset: document.getElementById("reset")
    };

    function text(value) { return String(value || "").toLowerCase(); }
    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }
    function timeToSeconds(time) {
      const parts = time.split(":").map(Number);
      if (parts.length !== 2 || parts.some(Number.isNaN)) return 0;
      return parts[0] * 60 + parts[1];
    }
    function transcriptHit(video) {
      const q = text(els.q.value);
      if (!q || !els.includeTranscript.checked || !video.transcript) return null;
      const line = video.transcript.split("\n").find(item => text(item).includes(q));
      if (!line) return null;
      const match = line.match(/^\[(\d{2}:\d{2})\]\s*(.*)$/);
      const time = match ? match[1] : "00:00";
      const body = match ? match[2] : line;
      const idx = text(body).indexOf(q);
      const start = Math.max(0, idx - 36);
      const end = Math.min(body.length, idx + q.length + 72);
      return {
        time,
        seconds: timeToSeconds(time),
        text: `${start > 0 ? "..." : ""}${body.slice(start, end)}${end < body.length ? "..." : ""}`
      };
    }
    function matches(video) {
      const q = text(els.q.value);
      const base = text([video.title, video.description, video.category, video.tool, video.type].join(" "));
      const transcript = els.includeTranscript.checked ? text(video.transcript) : "";
      return (!q || base.includes(q) || transcript.includes(q))
        && (!els.category.value || video.category === els.category.value)
        && (!els.tool.value || video.tool === els.tool.value)
        && (!els.type.value || video.type === els.type.value);
    }
    function render() {
      const filtered = videos.filter(matches);
      els.count.textContent = `${filtered.length} / ${videos.length} 件`;
      if (!filtered.length) {
        els.results.innerHTML = '<div class="empty">該当する動画がありません。</div>';
        return;
      }
      els.results.innerHTML = filtered.map(video => {
        const hit = transcriptHit(video);
        const url = escapeHtml(video.url);
        const hitUrl = hit ? `${url}${url.includes("?") ? "&" : "?"}t=${hit.seconds}s` : "";
        return `
          <article class="card">
            <a href="${url}" target="_blank" rel="noopener noreferrer">
              <img class="thumb" src="${escapeHtml(video.thumbnail)}" alt="" loading="lazy">
            </a>
            <div class="body">
              <a class="title" href="${url}" target="_blank" rel="noopener noreferrer">${escapeHtml(video.title)}</a>
              <div class="meta">
                <span class="tag">${escapeHtml(video.category)}</span>
                <span class="tag">${escapeHtml(video.tool)}</span>
                <span class="tag">${escapeHtml(video.type)}</span>
                ${video.transcript ? '<span class="tag transcript">文字起こし</span>' : ""}
              </div>
              ${hit ? `<a class="hit" href="${hitUrl}" target="_blank" rel="noopener noreferrer"><strong>[${escapeHtml(hit.time)}]</strong> ${escapeHtml(hit.text)}</a>` : ""}
              ${video.description ? `<p class="desc">${escapeHtml(video.description)}</p>` : ""}
            </div>
          </article>
        `;
      }).join("");
    }
    [els.q, els.category, els.tool, els.type, els.includeTranscript].forEach(el => el.addEventListener("input", render));
    els.reset.addEventListener("click", () => {
      els.q.value = "";
      els.category.value = "";
      els.tool.value = "";
      els.type.value = "";
      els.includeTranscript.checked = true;
      render();
    });
    render();
  </script>
